name: Deploy a GitHub Pages (páginas activas)

# Publica únicamente las páginas HTML accesibles desde la home:
#   index.html · transparencia.html · contacto.html · legal.html
# junto con los recursos que necesitan (css, js, assets, data).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Construir el sitio (solo páginas activas)
        run: |
          mkdir -p _site
          # Páginas HTML activas
          cp index.html transparencia.html contacto.html legal.html _site/
          # Recursos que usan esas páginas
          cp -r css js assets data _site/
          echo "Contenido publicado:"
          ls -R _site | head -60

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
